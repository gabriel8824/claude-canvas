<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Canvas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050810;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      margin-bottom: 24px;
      opacity: 0.95;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .status {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 32px;
    }

    .bar-track {
      width: 180px;
      height: 3px;
      background: #1e293b;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 99px;
      animation: slide 1.4s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(150%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <img class="logo" src="icon.png" alt="Claude Canvas" />
  <div class="title">Claude Canvas</div>
  <div class="status" id="status">Iniciando servidor…</div>
  <div class="bar-track">
    <div class="bar-fill"></div>
  </div>
</body>
</html>
