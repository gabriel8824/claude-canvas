name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # permite rodar manualmente pelo GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python (required by node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build client + server
        run: npm run build

      - name: Rebuild native modules for Electron (Windows)
        run: npx @electron/rebuild -f -w better-sqlite3,node-pty

      - name: Build Windows installer
        run: npx electron-builder --win
        env:
          # Sem certificado de codesign — remove aviso do SmartScreen em dev
          # Para produção: configure WIN_CSC_LINK e WIN_CSC_KEY_PASSWORD
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload EXE installer
        uses: actions/upload-artifact@v4
        with:
          name: claude-canvas-windows
          path: |
            dist-electron/*.exe
            dist-electron/*.blockmap
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
